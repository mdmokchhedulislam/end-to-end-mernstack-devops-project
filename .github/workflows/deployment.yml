

name: deployment

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        default: "deploy"

jobs:
  setup-bastion_host:
    runs-on: ubuntu-latest
    env:                               
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Bastion host SSH key prepare
    - name: Setup SSH key
      run: |
        echo "${{ secrets.BASTION_SSH_KEY }}" > secondaccount.pem
        chmod 600 secondaccount.pem

    # (Optional) Configure AWS credentials if dynamic inventory needs it
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install Ansible with AWS support
      run: pip install "ansible[amazon]" boto3 botocore

    - name: Run Ansible Playbook
      run: |
        ansible-playbook infra/ansible/playbooks/check.yml \
        -i infra/ansible/inventories/prod.yml \
        -u ubuntu --become \
        --private-key secondaccount.pem \
        --ssh-extra-args "-o StrictHostKeyChecking=no"