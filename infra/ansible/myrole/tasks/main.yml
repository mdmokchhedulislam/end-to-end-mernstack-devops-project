# Configure AWS credentials (use env vars)
# - name: Check variables
#   debug:
#     msg: "{{ aws_access_key }}"

- name: Configure AWS credentials
  copy:
    dest: /home/ubuntu/.aws/credentials
    content: |
      [default]
      aws_access_key_id = {{ lookup('env','AWS_ACCESS_KEY') }}
      aws_secret_access_key = {{ lookup('env','AWS_SECRET_KEY') }}
      region = {{ aws_region }}
    owner: ubuntu
    group: ubuntu
    mode: '0600'

# Update kubeconfig for EKS
- name: Update kubeconfig for EKS
  become: false
  command: aws eks update-kubeconfig --name {{ eks_cluster_name }} --region {{ aws_region }}

# Verify EKS cluster access
- name: Verify EKS cluster access
  become: false
  command: kubectl get nodes
  register: eks_nodes
  retries: "{{ max_retries }}"
  delay: "{{ retry_delay }}"
  until: eks_nodes.rc == 0

- name: Show EKS nodes
  debug:
    var: eks_nodes.stdout

# Copy K8s manifests
- name: Copy k8s manifests
  ansible.builtin.copy:
    src: "{{ k8s_manifest_dir }}/"
    dest: /home/ubuntu/k8s/
    owner: ubuntu
    group: ubuntu
    mode: '0644'
    remote_src: no

